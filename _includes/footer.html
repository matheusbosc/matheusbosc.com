<div class="border-top full-width container accent-bg" style="border-color: #4967dd !important;">
    <footer
        class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between my-3 py-5 px-3 full-width">

        <div class="d-inline-flex py-1 col-6 col-auto" style="max-height: 100%;">
            <div class="d-inline-flex">
                <a href="/" class="d-inline-flex align-items-center col-2 mb-1 mb-md-0 text-light text-decoration-none">
                    <img class="shift-hover d-inline-flex" src="/assets/images/icon.png" style="max-width: 80%; height: auto;">
                </a>
                <div class="row d-inline-flex">
                    <a href="/" class="link-light align-items-bottom text-decoration-none">
                        <h1 class="display-3 ps-1 link-light text-decoration-none">Matheus Boscariol</h1>
                    </a>
                    <h1 class="fs-6">Powered By GitHub Pages & Jekyll - <a
                            href="https://github.com/matheusbosc/matheusbosc.com" target="_blank"
                            class="link-light">Site Code</a></h1>
                </div>
            </div>
        </div>

        <ul class="nav col-6 col-md-auto mb-2 justify-content-right mb-md-0" style="font-size: 1.25rem;">


            {% for item in site.data.navigation %}
            <li><a href="{{ item.link }}"
                    class="nav-link px-4 {% if page.url==item.link %}link-tertiary{% else %}link-light{% endif %}">{{
                    item.name }}</a></li>
            {% endfor %}
        </ul>
    </footer>
</div>
