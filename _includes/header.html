<div class="full-width container header-bg border-bottom mb-4">
        <header
            class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 full-width">
            <a href="/" class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text-light text-decoration-none">
                <img src="/assets/images/icon.jpg" style="max-width: 25%; height: auto;">
            </a>

            <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">


                {% for item in site.data.navigation %}
                <li><a href="{{ item.link }}"
                        class="nav-link px-2 {% if page.url==item.link %}link-secondary{% else %}link-light{% endif %}">{{
                        item.name }}</a></li>
                {% endfor %}
            </ul>

            <div class="col-md-3 text-end">
                <button type="button" class="btn btn-outline-primary me-2">Login</button>
                <button type="button" class="btn btn-primary">Sign-up</button>
            </div>
        </header>
</div>
